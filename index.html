<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="まなび">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1812">
<meta name="description" content="オモチと一緒に算数・社会・理科を学ぶブラウザゲーム">
<link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="./icons/favicon-16.png">
<link rel="manifest" href="./manifest.webmanifest">
<title>オモチの まなび ぼうけん</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;}
  :root{
    --brass:#c8a04a; --brass-d:#9a7628; --brass-l:#e8c97a;
    --ink:#2a2018; --paper:#f4ead2;
    --neon:#48e0d0; --pink:#ff7aa8;
    --good:#5fc97a; --bad:#e8745f;
    --calc:#48e0d0;
    --sky-deep:#0a1428;
    --sky-mid:#1a3060;
  }
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:-apple-system,"Hiragino Maru Gothic ProN","Hiragino Kaku Gothic ProN","Yu Gothic","Rounded Mplus 1c",sans-serif;
    color:var(--paper);
    background:#0a0608;
    position:fixed;width:100%;height:100%;
    overscroll-behavior:none;touch-action:manipulation;
  }
  /* ============ 共通 screen 切替 ============ */
  .screen{
    position:fixed;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    transition:opacity .4s ease;
    opacity:0;pointer-events:none;
  }
  .screen.active{opacity:1;pointer-events:auto;}
  /* ============ 背景パーティクル（共通） ============ */
  .particles{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:0;}
  .particle{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--brass-l);
    box-shadow:0 0 10px var(--brass-l);opacity:.7;animation:float 8s linear infinite;}
  @keyframes float{
    0%{transform:translateY(110vh) scale(.4);opacity:0;}
    10%{opacity:.7;}
    90%{opacity:.7;}
    100%{transform:translateY(-10vh) scale(1);opacity:0;}
  }
  /* ============ オープニング ============ */
  #opening{
    background:radial-gradient(ellipse at 50% 60%, #2a2018 0%, #0a0608 70%);
  }
  /* 回転歯車（3層） */
  .gears{position:absolute;left:50%;top:34%;transform:translate(-50%,-50%);width:300px;height:300px;}
  .gear{position:absolute;left:50%;top:50%;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--brass-l), var(--brass-d) 70%);
    box-shadow:0 0 40px rgba(200,160,74,.5), inset -5px -5px 15px rgba(0,0,0,.4);
  }
  .gear::before,.gear::after{content:'';position:absolute;inset:18%;border-radius:50%;
    background:radial-gradient(circle, #2a2018, #0a0608);
    box-shadow:inset 0 0 20px rgba(0,0,0,.8);
  }
  .gear::after{inset:42%;background:var(--brass-l);box-shadow:0 0 8px var(--brass-l);}
  .gear.big{width:240px;height:240px;margin:-120px 0 0 -120px;animation:spin 14s linear infinite;opacity:.35;}
  .gear.mid{width:170px;height:170px;margin:-85px 0 0 -85px;animation:spin 9s linear infinite reverse;opacity:.55;}
  .gear.sml{width:110px;height:110px;margin:-55px 0 0 -55px;animation:spin 5s linear infinite;opacity:.85;}
  @keyframes spin{to{transform:rotate(360deg);}}

  /* タイトル */
  .title-stage{position:absolute;left:0;right:0;top:54%;text-align:center;z-index:3;}
  .title{
    font-size:min(11vw,52px);font-weight:900;letter-spacing:.06em;
    color:var(--brass-l);text-shadow:0 2px 0 var(--brass-d), 0 0 16px rgba(232,201,122,.7);
    display:inline-block;line-height:1.15;
  }
  .title .ch{display:inline-block;opacity:0;transform:translateY(40px) scale(.4) rotate(-10deg);
    animation:pop-in .55s cubic-bezier(.34,1.56,.64,1) forwards;}
  .title .ch.sp{width:.4em;}
  @keyframes pop-in{
    0%{opacity:0;transform:translateY(40px) scale(.4) rotate(-10deg);}
    60%{opacity:1;transform:translateY(-8px) scale(1.15) rotate(4deg);}
    100%{opacity:1;transform:translateY(0) scale(1) rotate(0);}
  }
  .subtitle{
    margin-top:14px;font-size:min(4vw,18px);color:var(--paper);opacity:0;
    animation:fade-in 1s ease 1.4s forwards;
    text-shadow:0 0 8px rgba(0,0,0,.6);
  }
  @keyframes fade-in{to{opacity:.8;}}

  /* オープニングのオモチ */
  .opener-char{
    position:absolute;left:50%;top:34%;transform:translate(-50%,-50%);
    font-size:min(22vw,120px);z-index:4;
    opacity:0;animation:char-appear 1s cubic-bezier(.34,1.56,.64,1) .8s forwards,
      char-wave 2s ease-in-out 2s infinite;
    filter:drop-shadow(0 6px 14px rgba(0,0,0,.6));
  }
  @keyframes char-appear{
    0%{opacity:0;transform:translate(-50%,40%) scale(.2) rotate(-20deg);}
    60%{opacity:1;transform:translate(-50%,-60%) scale(1.1) rotate(10deg);}
    100%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0);}
  }
  @keyframes char-wave{
    0%,100%{transform:translate(-50%,-50%) rotate(0);}
    25%{transform:translate(-50%,-55%) rotate(-8deg);}
    75%{transform:translate(-50%,-55%) rotate(8deg);}
  }

  /* スタートボタン */
  .start-btn{
    position:absolute;left:50%;bottom:14%;transform:translateX(-50%);
    padding:18px 42px;font-size:min(6vw,24px);font-weight:900;
    color:var(--ink);background:linear-gradient(180deg,var(--brass-l),var(--brass));
    border:3px solid var(--brass-d);border-radius:999px;cursor:pointer;
    box-shadow:0 6px 0 var(--brass-d), 0 12px 30px rgba(0,0,0,.5);
    opacity:0;animation:btn-in .6s ease 2.2s forwards, btn-pulse 1.6s ease 3s infinite;
    z-index:5;
  }
  @keyframes btn-in{
    0%{opacity:0;transform:translateX(-50%) translateY(40px) scale(.6);}
    100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1);}
  }
  @keyframes btn-pulse{
    0%,100%{box-shadow:0 6px 0 var(--brass-d), 0 12px 30px rgba(0,0,0,.5), 0 0 0 0 rgba(232,201,122,.55);}
    50%{box-shadow:0 6px 0 var(--brass-d), 0 12px 30px rgba(0,0,0,.5), 0 0 0 22px rgba(232,201,122,0);}
  }
  .start-btn:active{transform:translateX(-50%) translateY(4px);box-shadow:0 2px 0 var(--brass-d),0 4px 10px rgba(0,0,0,.4);animation:none;}

  /* ============ マップ選択 ============ */
  #select{
    background:radial-gradient(ellipse at 50% 0%, #2a2030 0%, #0a0608 70%);
    padding:24px;gap:18px;
  }
  .select-title{font-size:min(7vw,28px);font-weight:900;color:var(--brass-l);
    text-shadow:0 2px 0 var(--brass-d);text-align:center;margin-bottom:12px;}
  .map-list{display:flex;flex-direction:column;gap:14px;width:100%;max-width:420px;}
  .map-card{
    display:flex;align-items:center;gap:14px;padding:18px 20px;
    border:3px solid var(--brass-d);border-radius:22px;cursor:pointer;
    background:linear-gradient(135deg,rgba(72,224,208,.18),rgba(0,0,0,.4));
    transition:transform .15s ease, box-shadow .15s ease;
    box-shadow:0 4px 0 var(--brass-d), 0 8px 16px rgba(0,0,0,.4);
  }
  .map-card.locked{opacity:.45;background:linear-gradient(135deg,#222,#111);border-color:#444;}
  .map-card:not(.locked):active{transform:translateY(3px);box-shadow:0 1px 0 var(--brass-d),0 2px 6px rgba(0,0,0,.4);}
  .map-icon{font-size:min(12vw,48px);width:60px;text-align:center;}
  .map-info{flex:1;}
  .map-name{font-size:min(5vw,20px);font-weight:900;color:var(--paper);}
  .map-desc{font-size:min(3.4vw,13px);opacity:.7;margin-top:2px;}
  .map-arrow{font-size:min(7vw,28px);color:var(--brass-l);}
  .lock-tag{font-size:min(3.2vw,12px);background:#333;padding:3px 8px;border-radius:8px;color:#999;margin-left:auto;}
  .progress-badge{margin-top:6px;font-size:min(3.4vw,12px);font-weight:800;color:var(--brass-l);
    background:rgba(0,0,0,.4);display:inline-block;padding:3px 10px;border-radius:10px;}
  .progress-badge.cleared{color:#fff;background:linear-gradient(90deg,#5fc97a,#3e9554);}

  /* ============ すごろくマップ ============ */
  #board{background:linear-gradient(180deg,var(--sky-deep) 0%, var(--sky-mid) 70%, #0a1428 100%);}
  #board.stage-shakai{background:linear-gradient(180deg,#2c4a1a 0%,#5a7a3a 70%,#1a2810 100%);}
  #board.stage-rika{background:linear-gradient(180deg,#1a0a2a 0%,#4a2858 70%,#0a0518 100%);}
  #board.stage-shakai .stage-name{color:#cfff8a;text-shadow:0 0 12px rgba(180,240,120,.6);}
  #board.stage-rika .stage-name{color:#dab8ff;text-shadow:0 0 12px rgba(200,150,255,.7);}
  #board.stage-shakai .calc-bg-num{color:#cfff8a;font-family:Georgia,serif;}
  #board.stage-rika .calc-bg-num{color:#dab8ff;font-family:Georgia,serif;}
  .board-header{position:absolute;top:env(safe-area-inset-top, 0);left:0;right:0;
    padding:14px 18px;display:flex;justify-content:space-between;align-items:center;z-index:10;}
  .back-btn{background:rgba(0,0,0,.5);border:2px solid var(--brass);
    color:var(--paper);padding:8px 14px;border-radius:14px;font-weight:800;font-size:14px;cursor:pointer;}
  .stage-name{font-size:min(5vw,18px);font-weight:900;color:var(--neon);
    text-shadow:0 0 12px rgba(72,224,208,.7);}
  .medal-count{background:rgba(0,0,0,.5);border:2px solid var(--brass);
    padding:6px 12px;border-radius:14px;font-weight:800;font-size:14px;color:var(--brass-l);}

  /* 背景の数字 (けいさんの国だけ) */
  .calc-bg-num{position:absolute;font-size:80px;font-weight:900;color:var(--neon);
    opacity:.05;pointer-events:none;font-family:Georgia,serif;}

  /* 道とマス */
  .board-area{position:relative;width:100%;flex:1;max-width:480px;margin:0 auto;}
  .path-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;}
  .cell{
    position:absolute;width:min(13vw,46px);height:min(13vw,46px);border-radius:50%;
    background:radial-gradient(circle at 30% 30%, var(--brass-l), var(--brass) 60%, var(--brass-d));
    border:3px solid var(--brass-d);
    display:flex;align-items:center;justify-content:center;
    font-weight:900;font-size:min(4.5vw,18px);color:var(--ink);
    box-shadow:0 3px 0 var(--brass-d), 0 6px 12px rgba(0,0,0,.6), inset 0 -3px 6px rgba(0,0,0,.3);
    transform:translate(-50%,-50%);
  }
  .cell.bonus{
    background:radial-gradient(circle at 30% 30%, #ffeeaa, #f0a847 60%, #b07020);
    border-color:#b07020; color:#3a2810; font-size:min(5.5vw,22px);
    animation:bonus-pulse 1.6s ease-in-out infinite;
  }
  @keyframes bonus-pulse{
    0%,100%{box-shadow:0 3px 0 #b07020, 0 6px 12px rgba(0,0,0,.6), 0 0 0 0 rgba(255,200,80,.6), inset 0 -3px 6px rgba(0,0,0,.3);}
    50%{box-shadow:0 3px 0 #b07020, 0 6px 12px rgba(0,0,0,.6), 0 0 0 10px rgba(255,200,80,0), inset 0 -3px 6px rgba(0,0,0,.3);}
  }
  .cell.done{background:radial-gradient(circle at 30% 30%, #d8d8d8, #888);border-color:#555;color:#444;}
  .cell.current{animation:cell-glow 1.2s ease-in-out infinite;}
  @keyframes cell-glow{
    0%,100%{box-shadow:0 4px 0 var(--brass-d), 0 8px 16px rgba(0,0,0,.6), 0 0 0 0 rgba(232,201,122,.6), inset 0 -3px 8px rgba(0,0,0,.3);}
    50%{box-shadow:0 4px 0 var(--brass-d), 0 8px 16px rgba(0,0,0,.6), 0 0 0 14px rgba(232,201,122,0), inset 0 -3px 8px rgba(0,0,0,.3);}
  }
  .flag{position:absolute;transform:translate(-50%,-100%);font-size:34px;filter:drop-shadow(0 3px 6px rgba(0,0,0,.6));}
  .flag.start{}
  .flag.goal{animation:flag-wave 1.5s ease-in-out infinite;}
  @keyframes flag-wave{0%,100%{transform:translate(-50%,-100%) rotate(-3deg);}50%{transform:translate(-50%,-100%) rotate(3deg);}}

  /* 駒 */
  .piece{position:absolute;font-size:42px;z-index:5;
    transform:translate(-50%,-90%);
    transition:left .5s cubic-bezier(.5,1.6,.5,1), top .5s cubic-bezier(.5,1.6,.5,1);
    filter:drop-shadow(0 4px 8px rgba(0,0,0,.7));
  }
  .piece.idle{animation:piece-idle 1.6s ease-in-out infinite;}
  @keyframes piece-idle{0%,100%{transform:translate(-50%,-90%) translateY(0);}50%{transform:translate(-50%,-90%) translateY(-6px);}}

  .board-cta{
    position:absolute;left:50%;bottom:calc(20px + env(safe-area-inset-bottom, 0));transform:translateX(-50%);
    padding:16px 40px;font-size:20px;font-weight:900;
    color:var(--ink);background:linear-gradient(180deg,var(--neon),#2db8a5);
    border:3px solid #1a8077;border-radius:999px;cursor:pointer;
    box-shadow:0 6px 0 #1a8077, 0 10px 24px rgba(0,0,0,.5), 0 0 18px rgba(72,224,208,.6);
    z-index:11;animation:cta-bob 1.4s ease-in-out infinite;
  }
  @keyframes cta-bob{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(-4px);}}
  .board-cta:active{transform:translateX(-50%) translateY(4px);box-shadow:0 2px 0 #1a8077,0 4px 8px rgba(0,0,0,.4);animation:none;}

  /* ============ クイズモーダル ============ */
  #quiz{background:rgba(0,0,0,.85);backdrop-filter:blur(6px);}
  .quiz-box{
    width:min(92vw,440px);background:linear-gradient(180deg,#3a2f24,#241c14);
    border:4px solid var(--brass);border-radius:26px;padding:22px;
    box-shadow:0 20px 60px rgba(0,0,0,.7), inset 0 1px 0 rgba(255,255,255,.1);
    display:flex;flex-direction:column;gap:14px;
  }
  .quiz-head{display:flex;align-items:center;gap:12px;}
  .quiz-char{font-size:54px;animation:char-bob 1.6s ease-in-out infinite;
    filter:drop-shadow(0 3px 5px rgba(0,0,0,.5));}
  @keyframes char-bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
  .quiz-label{flex:1;font-size:13px;color:var(--brass-l);font-weight:800;letter-spacing:.1em;}
  .quiz-q{font-size:min(6vw,22px);font-weight:800;color:var(--paper);
    background:rgba(0,0,0,.4);border-radius:14px;padding:18px 16px;line-height:1.4;}
  .quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  .quiz-choices.vertical{grid-template-columns:1fr;gap:8px;}
  .choice{padding:14px 8px;font-size:min(4.5vw,17px);font-weight:800;
    color:var(--paper);background:linear-gradient(180deg,#4a3c2c,#2e251a);
    border:2px solid var(--brass-d);border-radius:14px;cursor:pointer;
    transition:transform .1s ease;word-break:break-word;line-height:1.35;min-height:54px;}
  .quiz-choices.vertical .choice{text-align:left;padding:14px 16px;font-size:min(4.2vw,16px);}
  .choice:active{transform:scale(.97);}
  .choice.correct{background:linear-gradient(180deg,#5fc97a,#3e9554);border-color:#2a6b3a;color:#fff;
    animation:correct-pulse .5s ease;}
  .choice.wrong{background:linear-gradient(180deg,#e8745f,#a83f30);border-color:#6e2a20;color:#fff;}
  @keyframes correct-pulse{0%{transform:scale(1);}50%{transform:scale(1.1);}100%{transform:scale(1);}}
  .quiz-feedback{text-align:center;font-size:18px;font-weight:900;min-height:24px;}
  .feedback-good{color:var(--good);}
  .feedback-bad{color:var(--bad);}

  /* 星エフェクト（正解時） */
  .star-burst{position:fixed;left:50%;top:50%;pointer-events:none;z-index:100;}
  .star-burst .s{position:absolute;font-size:28px;animation:star-fly 1s ease-out forwards;}
  @keyframes star-fly{
    0%{opacity:1;transform:translate(0,0) scale(.4) rotate(0);}
    100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.4) rotate(360deg);}
  }

  /* ============ クリア演出 ============ */
  #clear{
    background:radial-gradient(ellipse at 50% 50%, #4a3a18 0%, #0a0608 80%);
  }
  .clear-title{font-size:min(13vw,60px);font-weight:900;
    background:linear-gradient(180deg,var(--brass-l),var(--brass));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    text-shadow:0 4px 12px rgba(232,201,122,.4);
    animation:title-bounce 1s cubic-bezier(.34,1.56,.64,1);}
  @keyframes title-bounce{
    0%{opacity:0;transform:scale(.3);}
    60%{opacity:1;transform:scale(1.2);}
    100%{opacity:1;transform:scale(1);}
  }
  .clear-char{font-size:min(28vw,140px);margin:18px 0;
    animation:clear-jump 1.2s ease-in-out infinite;
    filter:drop-shadow(0 8px 16px rgba(0,0,0,.7));}
  @keyframes clear-jump{
    0%,100%{transform:translateY(0) rotate(0);}
    25%{transform:translateY(-30px) rotate(-8deg);}
    50%{transform:translateY(0) rotate(0);}
    75%{transform:translateY(-30px) rotate(8deg);}
  }
  .stars-row{display:flex;gap:12px;margin:10px 0 18px;}
  .star{font-size:42px;opacity:.2;transform:scale(.6);
    transition:opacity .3s ease, transform .3s ease;}
  .star.on{opacity:1;transform:scale(1);animation:star-pop .5s ease;}
  @keyframes star-pop{0%{transform:scale(.6) rotate(-30deg);}60%{transform:scale(1.4) rotate(15deg);}100%{transform:scale(1) rotate(0);}}
  .clear-medal{font-size:min(5vw,18px);color:var(--brass-l);font-weight:900;margin-bottom:24px;}
  .clear-btns{display:flex;gap:14px;flex-wrap:wrap;justify-content:center;padding:0 24px;}
  .clear-btn{padding:14px 28px;font-size:16px;font-weight:900;
    color:var(--ink);background:linear-gradient(180deg,var(--brass-l),var(--brass));
    border:3px solid var(--brass-d);border-radius:999px;cursor:pointer;
    box-shadow:0 4px 0 var(--brass-d),0 6px 12px rgba(0,0,0,.5);}
  .clear-btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--brass-d),0 2px 4px rgba(0,0,0,.4);}
  .clear-btn.sub{background:linear-gradient(180deg,#666,#333);border-color:#111;color:var(--paper);box-shadow:0 4px 0 #111,0 6px 12px rgba(0,0,0,.5);}

  /* 紙吹雪 */
  .confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50;}
  .conf{position:absolute;width:10px;height:14px;top:-20px;
    animation:conf-fall 3s linear forwards;}
  @keyframes conf-fall{
    0%{transform:translateY(0) rotate(0);opacity:1;}
    100%{transform:translateY(110vh) rotate(720deg);opacity:.5;}
  }

  /* ============ 音トグル（右下隅・⭐スコアとの干渉回避）============ */
  .sound-toggle{position:fixed;
    bottom:calc(env(safe-area-inset-bottom, 0) + 14px);right:14px;
    background:rgba(0,0,0,.6);border:2px solid var(--brass);
    width:46px;height:46px;border-radius:50%;font-size:20px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:99;
    color:var(--paper);box-shadow:0 4px 10px rgba(0,0,0,.5);}
  .sound-toggle:active{transform:scale(.92);}

  /* ============ フェーズ2: 演出豪華化 ============ */

  /* ①-a オープニング 暗転スタート */
  #opening::before{
    content:'';position:absolute;inset:0;background:#000;z-index:10;
    animation:dim-fade 1.2s ease-out forwards;pointer-events:none;
  }
  @keyframes dim-fade{0%{opacity:1;}80%{opacity:.3;}100%{opacity:0;}}
  /* 歯車が1個ずつ噛み合う（既存 .gear に delay） */
  .gear.big{animation-delay:.2s;animation:gear-in 1s cubic-bezier(.34,1.56,.64,1) .2s both, spin 14s linear infinite 1.2s;}
  .gear.mid{animation:gear-in 1s cubic-bezier(.34,1.56,.64,1) .6s both, spin 9s linear infinite reverse 1.6s;}
  .gear.sml{animation:gear-in 1s cubic-bezier(.34,1.56,.64,1) 1.0s both, spin 5s linear infinite 2.0s;}
  @keyframes gear-in{
    0%{opacity:0;transform:scale(.2) rotate(-180deg);}
    60%{opacity:.7;transform:scale(1.15) rotate(20deg);}
    100%{opacity:.35;transform:scale(1) rotate(0);}
  }
  .gear.mid{opacity:0;}
  .gear.sml{opacity:0;}
  .gear.big{opacity:0;}
  /* 蒸気エフェクト */
  .steam{position:absolute;left:50%;top:34%;transform:translate(-50%,-50%);pointer-events:none;z-index:2;}
  .steam span{position:absolute;left:50%;top:50%;width:30px;height:30px;border-radius:50%;

  if (CHAR_CONFIG.useImage) {
    const f = CHAR_CONFIG.expressions[expression] || CHAR_CONFIG.expressions.idle;
    return `<img src="${CHAR_CONFIG.imageBase}${f}" alt="オモチ" class="omochi-img omochi-${expression}">`;
  }
  return CHAR_CONFIG.emoji;
}

/* ========== 計算問題 自動生成（けいさんの くに 用） ========== */
function makeCalc() {
  const kind = rnd(1,3); // 1:+ 2:- 3:×
  let a,b,op,ans;
  if (kind===1) { a=rnd(2,40); b=rnd(2,40); op='+'; ans=a+b; }
  else if (kind===2) { a=rnd(10,60); b=rnd(1,a); op='−'; ans=a-b; }
  else { a=rnd(2,9); b=rnd(2,9); op='×'; ans=a*b; }
  const set = new Set([ans]);
  let guard = 0;
  while (set.size<4 && guard<60) {
    guard++;
    const v = ans + rnd(1,9)*(Math.random()<0.5?-1:1);
    if (v>=0) set.add(v);
  }
  while (set.size<4) set.add(ans + set.size);
  return {
    text: `${a} ${op} ${b} = ?`,
    ans: String(ans),
    choices: shuffle([...set].map(String))
  };
}

/* ========== 問題プールからの出題（しゃかい / りか）========== */
const Q_QUEUE = { shakai: [], rika: [] };
function pickFromPool(poolKey) {
  const pool = poolKey === 'shakai' ? SHAKAI : RIKA;
  if (Q_QUEUE[poolKey].length === 0) {
    Q_QUEUE[poolKey] = shuffle(pool.slice());
  }
  const item = Q_QUEUE[poolKey].pop();
  return {
    text: item.q,
    ans:  item.a,
    choices: shuffle([item.a, ...item.w])
  };
}
const makeShakai = () => pickFromPool('shakai');
const makeRika   = () => pickFromPool('rika');

/* ========== Web Audio: SE 6種 + BGM ループ ========== */
const SOUND = { on:false };
let audioCtx = null, masterGain = null, sfxGain = null, musicGain = null;
let bgmTimer = null, bgmBar = 0;

function initAudio() {
  if (audioCtx) return;
  const AC = window.AudioContext || window.webkitAudioContext;
  if (!AC) return;
  audioCtx = new AC();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0; // 初期ミュート
  masterGain.connect(audioCtx.destination);
  sfxGain = audioCtx.createGain();   sfxGain.gain.value = 0.55; sfxGain.connect(masterGain);
  musicGain = audioCtx.createGain(); musicGain.gain.value = 0.22; musicGain.connect(masterGain);
}
// iOS Safari: ユーザータップ後でないと AudioContext が走らない。各 UI 操作で呼ぶ。
function ensureAudio() {
  if (!audioCtx) initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
// 単音再生（target を sfxGain/musicGain で振り分け、pitch slide 対応）
function tone(freq, dur, type, gain, when, slideTo, target) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime + (when || 0);
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  osc.type = type || 'triangle';
  osc.frequency.setValueAtTime(freq, t);
  if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t + dur);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(gain, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(g); g.connect(target || sfxGain);
  osc.start(t); osc.stop(t + dur + 0.05);
}
// ノイズ系（クリック音）
function clickBurst(when) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime + (when || 0);
  const buf = audioCtx.createBuffer(1, 1024, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0; i<1024; i++) d[i] = (Math.random()*2-1) * Math.exp(-i/80);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const g = audioCtx.createGain(); g.gain.value = 0.18;
  src.connect(g); g.connect(sfxGain);
  src.start(t);
}
// SE ディスパッチ
function se(name) {
  if (!audioCtx || !SOUND.on) return;
  switch(name) {
    case 'correct':
      tone(523.25, 0.10, 'triangle', 0.50, 0.00);    // C5
      tone(659.25, 0.10, 'triangle', 0.50, 0.10);    // E5
      tone(783.99, 0.22, 'triangle', 0.50, 0.20);    // G5
      tone(1046.5, 0.30, 'sine',     0.20, 0.20);    // 上ハモリ
      break;
    case 'wrong':
      tone(329.63, 0.18, 'triangle', 0.30, 0.00);    // E4
      tone(261.63, 0.26, 'triangle', 0.30, 0.12);    // C4 (柔らかい下降)
      break;
    case 'step':
      tone(420, 0.07, 'triangle', 0.35, 0.00, 680);  // ぴょこっ上昇
      tone(220, 0.06, 'sine',     0.20, 0.06, 120);  // 着地
      break;
    case 'tap':
      tone(1320, 0.025, 'sine', 0.25, 0.00);
      clickBurst(0);
      break;
    case 'clear':
      // ファンファーレ C-E-G-C ＋ 持続コード
      tone(523.25, 0.12, 'triangle', 0.45, 0.00);
      tone(659.25, 0.12, 'triangle', 0.45, 0.12);
      tone(783.99, 0.12, 'triangle', 0.45, 0.24);
      tone(1046.5, 0.60, 'triangle', 0.55, 0.36);
      tone(659.25, 0.60, 'sine',     0.25, 0.36);   // ハモリ
      tone(392.00, 0.60, 'sine',     0.18, 0.36);   // ベース
      break;
    case 'appear':
      tone(250, 0.10, 'sine', 0.40, 0.00, 900);     // ポンッ
      tone(600, 0.18, 'triangle', 0.20, 0.05, 1200);
      break;
  }
}
// BGM: 4小節ループ（C-Am-F-G）。ベース+アルペジオ+メロディの簡素版
function startBGM() {
  if (bgmTimer || !audioCtx) return;
  const beat = 0.42; // 1拍の長さ秒（少しゆっくり目）
  // 4小節 × 4拍 = 16拍
  const PROG = [
    { bass: 130.81, arp: [261.63, 329.63, 392.00, 329.63] }, // C
    { bass: 110.00, arp: [220.00, 261.63, 329.63, 261.63] }, // Am
    { bass: 174.61, arp: [220.00, 261.63, 349.23, 261.63] }, // F
    { bass: 196.00, arp: [246.94, 293.66, 392.00, 293.66] }, // G
  ];
  // やさしいメロディ（4小節通し、16音）
  const MELODY = [
    659.25, 783.99, 880.00, 783.99,   // C 小節
    659.25, 783.99, 659.25, 523.25,   // Am 小節
    698.46, 783.99, 880.00, 783.99,   // F 小節
    587.33, 698.46, 783.99, 587.33    // G 小節
  ];
  bgmBar = 0;
  const playBar = () => {
    if (!SOUND.on || !audioCtx) { bgmTimer = null; return; }
    const chord = PROG[bgmBar % 4];
    // ベース：2分音符×2
    tone(chord.bass, beat*2*0.85, 'sine', 0.35, 0.00, null, musicGain);
    tone(chord.bass, beat*2*0.85, 'sine', 0.30, beat*2, null, musicGain);
    // アルペジオ
    chord.arp.forEach((f, i) => {
      tone(f, beat*0.55, 'triangle', 0.18, i*beat, null, musicGain);
    });
    // メロディ
    for (let i=0; i<4; i++) {
      const mfreq = MELODY[(bgmBar%4)*4 + i];
      tone(mfreq, beat*0.65, 'sine', 0.28, i*beat + beat*0.10, null, musicGain);
    }
    bgmBar++;
    bgmTimer = setTimeout(playBar, beat * 4 * 1000);
  };
  playBar();
}
function stopBGM() {
  if (bgmTimer) { clearTimeout(bgmTimer); bgmTimer = null; }
}
function setMuted(muted) {
  ensureAudio();
  if (!audioCtx) return;
  const target = muted ? 0 : 0.75;
  masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
  masterGain.gain.linearRampToValueAtTime(target, audioCtx.currentTime + 0.08);
  if (muted) stopBGM();
  else startBGM();
}

/* マスの位置を計算（多列ジグザグ・15マスまで画面に収まる）
   total = n + 2 (start + n + goal) を 5列ジグザグで配置 */
function calcCellPositions(n) {
  const total = n + 2;
  const colsPerRow = 5;
  const rows = Math.ceil(total / colsPerRow);
  const positions = [];
  // 横位置: 端から 12〜88%
  const xs = [];
  for (let c=0; c<colsPerRow; c++) {
    xs.push(12 + (76 * c) / (colsPerRow - 1));
  }
  // 縦位置: 上端 8% から 下端 92% で rows 段に等分
  let placed = 0;
  for (let r=0; r<rows; r++) {
    const reverse = (r % 2 === 1);
    const order = reverse ? xs.slice().reverse() : xs;
    const y = (rows === 1) ? 50 : 8 + (84 * r) / (rows - 1);
    for (let c=0; c<colsPerRow && placed<total; c++) {
      positions.push([order[c], y]);
      placed++;
    }
  }
  return positions;
}

/* ボーナスマス（？マーク・正解で +2 メダル）の番号を固定で 3 つ選ぶ */
function bonusCells(n) {
  // 中盤と終盤に散らす（15マスなら 4, 9, 13）
  if (n >= 10) return [Math.floor(n*0.27), Math.floor(n*0.60), Math.floor(n*0.87)];
  return [Math.floor(n*0.5)];
}

  });
  const path = document.createElementNS('http://www.w3.org/2000/svg','path');

  path.setAttribute('stroke','rgba(232,201,122,.4)');
  path.setAttribute('stroke-width','2');
  path.setAttribute('stroke-dasharray','3 3');

  // ゴール旗

  // マス（ボーナスマスを 3 箇所マーキング）

      showScreen('board');
      // クイズ閉じたら、ゴール到達 or 続行を判定
      if (G.pos === G.map.cells) {
        // 次のすすむでゴール
      }
    }, 900);
  } else {
    se('wrong');
    G.combo = 0;
    btn.classList.add('wrong');
    // 正解ボタンを示す
    document.querySelectorAll('.choice').forEach(b => {
      if (b.textContent === currentQ.ans) b.classList.add('correct');
    });
    $('quizFeedback').textContent = 'こたえ：' + currentQ.ans;
    $('quizFeedback').className = 'quiz-feedback feedback-bad';
    $('quizChar').innerHTML = omochi('sad');
    // ハーフ進む扱い（=ペナルティなし、進む）
    setTimeout(() => {
      showScreen('board');
    }, 1500);
  }
}

/* フラッシュ：画面を一瞬白く */
function flashScreen() {
  const o = document.createElement('div');
  o.className = 'flash-overlay';
  document.body.appendChild(o);
  setTimeout(() => o.remove(), 400);
}

/* コンボバナー：2連目以上で「コンボ ×N」表示。3連以上は炎色 */
function showComboBanner(n) {
  const b = document.createElement('div');
  b.className = 'combo-banner' + (n >= 3 ? ' fire' : '');
  b.textContent = `コンボ ×${n}`;
  document.body.appendChild(b);
  // 3連以上で正解音のピッチを上げる追い演出
  if (n >= 3 && audioCtx && SOUND.on) {
    tone(1200 + n*50, 0.15, 'square', 0.18, 0.05);
  }
  setTimeout(() => b.remove(), 1050);
}

/* 駒の正解バウンス */
function bouncePiece() {
  const p = $('piece');
  if (!p) return;
  p.classList.add('bouncing');
  setTimeout(() => p.classList.remove('bouncing'), 900);
}

/* 正解時の星演出 */
function burstStars() {
  const burst = document.createElement('div');
  burst.className = 'star-burst';
  document.body.appendChild(burst);
  const stars = ['⭐','✨','🌟','💫'];
  for (let i=0; i<8; i++) {
    const s = document.createElement('div');
    s.className = 's';
    s.textContent = stars[i%stars.length];
    const a = (i/8) * Math.PI * 2;
    s.style.setProperty('--dx', Math.cos(a)*140 + 'px');
    s.style.setProperty('--dy', Math.sin(a)*140 + 'px');
    s.style.animationDelay = (i*0.04) + 's';
    burst.appendChild(s);
  }
  setTimeout(() => burst.remove(), 1100);
}

/* ========== 進捗保存（localStorage）========== */
function getBest() {
  try { return JSON.parse(localStorage.getItem('omochi-best') || '{}'); }
  catch(e) { return {}; }
}
function saveBest(mapKey, medals) {
  try {
    const best = getBest();
    if ((best[mapKey] || 0) < medals) {
      best[mapKey] = medals;
      localStorage.setItem('omochi-best', JSON.stringify(best));
    }
  } catch(e) {}
}
function refreshSelectProgress() {
  const best = getBest();
  document.querySelectorAll('.map-card').forEach(card => {
    const map = card.dataset.map;
    if (!map || !STAGE[map]) return;
    const cells = STAGE[map].cells;
    const got = best[map] || 0;
    let badge = card.querySelector('.progress-badge');
    if (!badge) {
      badge = document.createElement('div');
      badge.className = 'progress-badge';
      card.querySelector('.map-info').appendChild(badge);
    }
    badge.textContent = `ベスト ⭐ ${got} / ${cells}`;
    if (got >= cells) badge.classList.add('cleared');
  });
}

/* ========== クリア画面 ========== */
function showClear() {
  ensureAudio(); se('clear');
  saveBest(G.mapKey, G.medals);
  $('clearChar').innerHTML = omochi('cheer');
  // ランク判定: 15マス想定で ⭐3=13+, ⭐2=9+, ⭐1=4+, それ未満は ナイス
  const m = G.medals;
  const max = G.map.cells;
  const starCount = m >= Math.round(max*0.85) ? 3 : m >= Math.round(max*0.55) ? 2 : 1;
  const rank = (m >= max ? 'パーフェクト！' : starCount===3 ? 'すごい！' : starCount===2 ? 'いいね！' : 'ナイスチャレンジ！');
  const row = $('starsRow');
  row.innerHTML = '';
  for (let i=0; i<3; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    s.textContent = '⭐';
    row.appendChild(s);
  }
  $('clearMedal').textContent = `あつめた メダル： ${m} / ${max}`;
  showScreen('clear');
  // 紙吹雪
  const cf = $('confetti');
  cf.innerHTML = '';
  const colors = ['#e8c97a','#48e0d0','#ff7aa8','#5fc97a','#f0a847'];
  for (let i=0; i<32; i++) {
    const e = document.createElement('div');
    e.className = 'conf';
    e.style.left = rnd(0,100) + '%';
    e.style.background = colors[i%colors.length];
    e.style.animationDelay = (Math.random()*0.8) + 's';
    e.style.animationDuration = (2 + Math.random()*1.5) + 's';
    cf.appendChild(e);
  }
  // 星を順番に点灯
  const allStars = row.querySelectorAll('.star');
  for (let i=0; i<starCount; i++) {
    setTimeout(() => allStars[i].classList.add('on'), 600 + i*350);
  }
  // 宝箱演出: clearChar の前に挿入（一回のみ）
  const clearSection = $('clear');
  const oldTreasure = clearSection.querySelector('.treasure-wrap');
  if (oldTreasure) oldTreasure.remove();
  const tw = document.createElement('div');
  tw.className = 'treasure-wrap';
  tw.style.cssText = 'position:relative;display:flex;flex-direction:column;align-items:center;';
  const tl = document.createElement('div');
  tl.className = 'treasure-light';
  tw.appendChild(tl);
  const t = document.createElement('div');
  t.className = 'treasure';
  t.textContent = '🎁';
  setTimeout(() => { t.textContent = '✨'; }, 2100); // 開く演出（簡易: 絵文字差替え）
  setTimeout(() => { t.textContent = '🎉'; }, 2400);
  tw.appendChild(t);
  $('clearChar').parentNode.insertBefore(tw, $('clearChar'));
  // 宝箱が開く瞬間に効果音
  setTimeout(() => { if (audioCtx && SOUND.on) { tone(523, 0.15, 'triangle', 0.5, 0, 1500); } }, 2000);
  // メダル降り注ぎ
  let rain = document.querySelector('.medal-rain');
  if (rain) rain.remove();
  rain = document.createElement('div');
  rain.className = 'medal-rain';
  document.body.appendChild(rain);
  const medalKinds = ['⭐','🪙','✨','🌟'];
  const count = starCount === 3 ? 40 : starCount === 2 ? 25 : 15;
  for (let i=0; i<count; i++) {
    const md = document.createElement('div');
    md.className = 'm';
    md.textContent = medalKinds[i % medalKinds.length];
    md.style.left = rnd(0,100) + '%';
    md.style.animationDelay = (1.5 + Math.random()*1.5) + 's';
    md.style.animationDuration = (2 + Math.random()*1.2) + 's';
    rain.appendChild(md);
  }
  setTimeout(() => rain.remove(), 5500);
  // ランクスタンプ
  let stamp = document.querySelector('.rank-stamp');
  if (stamp) stamp.remove();
  stamp = document.createElement('div');
  stamp.className = 'rank-stamp' + (m >= max ? ' perfect' : '');
  stamp.textContent = rank;
  document.body.appendChild(stamp);
  // スタンプが押される瞬間に効果音
  setTimeout(() => {
    if (audioCtx && SOUND.on) {
      tone(80, 0.10, 'square', 0.5, 0);   // ドン！
      tone(40, 0.20, 'sine',   0.4, 0.02);
    }
  }, 3000);
  setTimeout(() => stamp.remove(), 9000);
  // クリア画面を離れたとき残骸を掃除
  const cleanup = () => {
    document.querySelectorAll('.rank-stamp,.medal-rain,.treasure-wrap').forEach(e => e.remove());
    $('againBtn').removeEventListener('click', cleanup);
    $('toSelectBtn').removeEventListener('click', cleanup);
  };
  $('againBtn').addEventListener('click', cleanup);
  $('toSelectBtn').addEventListener('click', cleanup);
}

$('againBtn').addEventListener('click', () => { ensureAudio(); se('tap'); startBoard('calc'); });

setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', setVH);
