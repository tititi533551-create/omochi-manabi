<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="まなび">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1c1812">
<meta name="description" content="オモチと一緒に算数・社会・理科を学ぶブラウザゲーム">
<title>オモチの まなび ぼうけん</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root{
    --brass:#c8a04a; --brass-d:#9a7628; --brass-l:#e8c97a;
    --ink:#2a2018; --paper:#f4ead2; --neon:#48e0d0; --pink:#ff7aa8;
    --good:#5fc97a; --bad:#e8745f;
    --calc:#48e0d0; --shakai:#f0a847; --rika:#7ec97e;
  }
  html,body{height:100%;}
  body{
    font-family:-apple-system,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:radial-gradient(circle at 50% -10%, #3a3020, #1c1812 60%);
    color:var(--paper);
    display:flex; align-items:center; justify-content:center;
    min-height:100%; padding:16px; overflow-x:hidden;
  }
  .frame{
    width:100%; max-width:460px;
    background:linear-gradient(180deg,#2c241a,#221b13);
    border:4px solid var(--brass); border-radius:22px;
    box-shadow:0 0 0 2px var(--brass-d), 0 18px 50px rgba(0,0,0,.6),
               inset 0 0 30px rgba(200,160,74,.08);
    padding:22px 20px 26px; position:relative;
  }
  .gear{position:absolute;width:34px;height:34px;border-radius:50%;
    border:5px dotted var(--brass-d);opacity:.5;}
  .gear.tl{top:-12px;left:-12px;} .gear.tr{top:-12px;right:-12px;}
  .gear.bl{bottom:-12px;left:-12px;} .gear.br{bottom:-12px;right:-12px;}

  h1{font-size:20px;text-align:center;color:var(--brass-l);
    letter-spacing:1px;margin-bottom:4px;text-shadow:0 1px 0 #000;}
  .sub{text-align:center;font-size:12px;color:#b8a888;margin-bottom:14px;}

  .hud{display:flex;justify-content:space-between;align-items:center;
    font-size:13px;margin-bottom:12px;gap:8px;}
  .hud .pill{background:#1a140e;border:1px solid var(--brass-d);
    border-radius:999px;padding:5px 12px;color:var(--brass-l);}
  .hud .pill b{color:var(--neon);}
  .hud .pill .heart{color:var(--pink);}

  .stage{background:#15100a;border:2px solid var(--brass-d);
    border-radius:16px;padding:18px 14px;text-align:center;position:relative;
    min-height:240px;display:flex;flex-direction:column;align-items:center;justify-content:center;}

  .mochi{font-size:66px;line-height:1;filter:drop-shadow(0 0 10px rgba(72,224,208,.35));transition:transform .15s;}
  .mochi.happy{animation:bounce .5s;}
  .mochi.sad{animation:shake .4s;}
  @keyframes bounce{0%,100%{transform:translateY(0)}30%{transform:translateY(-18px)}60%{transform:translateY(-6px)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

  .speech{margin-top:8px;font-size:14px;color:var(--paper);min-height:20px;}
  .q{font-size:30px;font-weight:700;color:var(--brass-l);margin:8px 4px 2px;
    letter-spacing:1px;text-shadow:0 2px 0 #000;line-height:1.35;}
  .q.calc{font-size:40px;letter-spacing:2px;}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;}
  .choices.col1{grid-template-columns:1fr;}
  .choice{
    background:linear-gradient(180deg,var(--brass-l),var(--brass));
    color:var(--ink);font-size:18px;font-weight:800;
    border:none;border-bottom:4px solid var(--brass-d);border-radius:14px;
    padding:15px 8px;cursor:pointer;transition:transform .08s, filter .1s;line-height:1.3;
  }
  .choice.num{font-size:26px;}
  .choice:active{transform:translateY(3px);border-bottom-width:1px;}
  .choice.correct{background:linear-gradient(180deg,#86e29a,var(--good));border-bottom-color:#3a8a4f;}
  .choice.wrong{background:linear-gradient(180deg,#f0a596,var(--bad));border-bottom-color:#a8412f;}
  .choice:disabled{cursor:default;opacity:.95;}

  .bar{height:10px;background:#15100a;border-radius:999px;margin-top:16px;overflow:hidden;border:1px solid var(--brass-d);}
  .bar > i{display:block;height:100%;width:0;border-radius:999px;background:linear-gradient(90deg,var(--neon),var(--brass-l));transition:width .4s;}

  .center-btn{display:block;margin:18px auto 0;
    background:linear-gradient(180deg,var(--neon),#2bbfb0);
    color:#06302c;font-weight:800;font-size:17px;
    border:none;border-bottom:4px solid #1d8a7e;border-radius:14px;
    padding:14px 30px;cursor:pointer;}
  .center-btn:active{transform:translateY(3px);border-bottom-width:1px;}

  /* 教科えらび */
  .subjects{display:grid;grid-template-columns:1fr;gap:12px;margin:6px 0 4px;}
  .subj{display:flex;align-items:center;gap:14px;cursor:pointer;
    background:#1a140e;border:2px solid var(--brass-d);border-radius:16px;
    padding:14px 16px;text-align:left;transition:transform .08s;}
  .subj:active{transform:scale(.98);}
  .subj .ico{font-size:34px;}
  .subj .tx b{display:block;font-size:18px;color:var(--brass-l);}
  .subj .tx span{font-size:12px;color:#b8a888;}
  .subj.calc{border-color:var(--calc);}
  .subj.shakai{border-color:var(--shakai);}
  .subj.rika{border-color:var(--rika);}

  .lv-picker{display:flex;gap:8px;justify-content:center;margin:14px 0 4px;flex-wrap:wrap;}
  .lv{background:#1a140e;border:2px solid var(--brass-d);color:var(--brass-l);
    border-radius:12px;padding:9px 13px;font-size:13px;cursor:pointer;font-weight:700;}
  .lv.on{background:var(--brass);color:var(--ink);}

  .big{font-size:50px;}
  .gold{color:var(--brass-l);}
  .small{font-size:12px;color:#b8a888;margin-top:8px;}
  .hint{font-size:12px;color:var(--neon);margin-top:6px;min-height:16px;}
  .hidden{display:none;}
  .stars{font-size:26px;letter-spacing:4px;margin:8px 0;}
  .backline{text-align:center;margin-top:14px;}
  .backbtn{background:none;border:1px solid var(--brass-d);color:#b8a888;
    border-radius:999px;padding:7px 16px;font-size:12px;cursor:pointer;}
</style>
</head>
<body>
<div class="frame">
  <div class="gear tl"></div><div class="gear tr"></div>
  <div class="gear bl"></div><div class="gear br"></div>

  <h1>⚙ オモチの まなび ぼうけん ⚙</h1>
  <div class="sub" id="topSub">きょうかを えらんで ちょうせん！</div>

  <!-- 教科えらび -->
  <div id="menuView">
    <div class="stage">
      <div class="mochi">🐹</div>
      <div class="speech">どの ステージに いく？</div>
      <div class="subjects">
        <button class="subj calc" data-subj="calc">
          <span class="ico">🔢</span>
          <span class="tx"><b>けいさん ステージ</b><span>たし算・ひき算・かけ算</span></span>
        </button>
        <button class="subj shakai" data-subj="shakai">
          <span class="ico">🗾</span>
          <span class="tx"><b>しゃかい ステージ</b><span>都道府県・地図記号・くらし・岡山</span></span>
        </button>
        <button class="subj rika" data-subj="rika">
          <span class="ico">🔬</span>
          <span class="tx"><b>りか ステージ</b><span>電気・水・星・体・生きもの</span></span>
        </button>
      </div>
    </div>
    <!-- 計算だけ難易度を出す -->
    <div id="calcLevel" class="hidden">
      <div class="lv-picker" id="lvPicker">
        <button class="lv on" data-lv="1">たし・ひき</button>
        <button class="lv" data-lv="2">かけ算</button>
        <button class="lv" data-lv="3">ミックス</button>
      </div>
      <div class="small">むずかしさを えらんで「はじめる」</div>
      <button class="center-btn" id="calcStartBtn">▶ はじめる</button>
      <div class="backline"><button class="backbtn" id="calcBack">← もどる</button></div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div id="gameView" class="hidden">
    <div class="hud">
      <span class="pill">メダル <b id="score">0</b></span>
      <span class="pill" id="streakPill">れんぞく <b id="streak">0</b></span>
      <span class="pill heart" id="hearts">❤❤❤</span>
    </div>
    <div class="stage">
      <div class="mochi" id="mochi">🐹</div>
      <div class="speech" id="speech"></div>
      <div class="q" id="question"></div>
      <div class="hint" id="hint"></div>
    </div>
    <div class="choices" id="choices"></div>
    <div class="bar"><i id="bar"></i></div>
    <div class="small" id="progress">1 / 10もん</div>
  </div>

  <!-- 結果画面 -->
  <div id="endView" class="hidden">
    <div class="stage">
      <div class="mochi big" id="endMochi">🏆</div>
      <div class="stars" id="stars">⭐⭐⭐</div>
      <div class="speech" id="endMsg">クリア！</div>
      <div class="q gold" id="endScore">メダル 0こ</div>
    </div>
    <button class="center-btn" id="againBtn">↻ もういちど えらぶ</button>
  </div>
</div>

<script>
(function(){
  const S = { subject:'calc', level:1, idx:0, total:10, score:0, streak:0, hearts:3, locked:false, queue:[] };
  const el = id => document.getElementById(id);
  function rnd(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
  function shuffle(a){return a.slice().sort(()=>Math.random()-0.5);}

  // ===== 社会（小4：全国共通＋岡山） =====
  const SHAKAI = [
    {q:'岡山県の 県庁が ある 市は どこ？', a:'岡山市', w:['倉敷市','津山市','広島市']},
    {q:'むかしばなし「ももたろう」で ゆうめいな 県は？', a:'岡山県', w:['香川県','鳥取県','島根県']},
    {q:'岡山県の くだもので ゆうめいなのは？', a:'マスカット（ぶどう）', w:['みかん','りんご','さくらんぼ']},
    {q:'倉敷市の 古い 町なみで ゆうめいな 場所は？', a:'美観地区', w:['後楽園','道頓堀','浅草']},
    {q:'日本で いちばん 数が おおい 「市町村」を まとめた 大きな 区わけを 何という？', a:'都道府県', w:['市区町村','地方','地区']},
    {q:'都道府県は ぜんぶで いくつ ある？', a:'47', w:['43','50','39']},
    {q:'「文」の 地図記号は 何を あらわす？', a:'学校', w:['ゆうびん局','病院','こうばん']},
    {q:'「〒」の 地図記号は 何を あらわす？', a:'ゆうびん局', w:['けいさつ','学校','工場']},
    {q:'りんごの 形の 地図記号は 何ばたけ？', a:'くだもの畑（果樹園）', w:['田んぼ','森林','茶ばたけ']},
    {q:'わたしたちが つかった 水は どこで きれいに される？', a:'下水しょり場', w:['ダム','じょう水場','はつでん所']},
    {q:'川の 水を のめるように する しせつは？', a:'じょう水場', w:['下水しょり場','せいそう工場','ダム']},
    {q:'もえる ゴミを もやす しせつは？', a:'せいそう工場（ゴミしょり場）', w:['じょう水場','はつでん所','下水しょり場']},
    {q:'火事の とき 来てくれるのは？', a:'しょうぼうしょ', w:['けいさつしょ','市やくしょ','びょういん']},
    {q:'事けんや 事こで たすけてくれるのは？', a:'けいさつしょ', w:['しょうぼうしょ','ゆうびん局','学校']},
    {q:'地図で 上の ほうほうは ふつう どっち？', a:'北', w:['南','東','西']},
    {q:'瀬戸内海を わたって 岡山と 香川を つなぐ 大きな はしは？', a:'瀬戸大橋', w:['明石海きょう大橋','レインボーブリッジ','日本橋']},
  ];

  // ===== 理科（小4） =====
  const RIKA = [
    {q:'水を ひやして こおらせると 何に なる？', a:'氷（こおり）', w:['水じょう気','ゆげ','あわ']},
    {q:'水を あたためつづけると ぶくぶく わいて 何に なる？', a:'水じょう気', w:['氷','石','土']},
    {q:'水が 水じょう気に なって 空気中に でていくことを 何という？', a:'じょうはつ', w:['ねっとう','こおり','こおりどけ']},
    {q:'かん電池の むきを はんたいに すると モーターは どうなる？', a:'まわる むきが かわる', w:['とまる','こわれる','はやくなる']},
    {q:'かん電池を 2こ 「直列」に つなぐと 豆電球は どうなる？', a:'明るくなる', w:['暗くなる','消える','色がかわる']},
    {q:'電気を よく とおす ものは どれ？', a:'鉄や どう（金ぞく）', w:['プラスチック','木','ゴム']},
    {q:'空気は あたためると どうなる？', a:'ふくらむ（体積がふえる）', w:['ちぢむ','おもくなる','こおる']},
    {q:'とじこめた 空気を おすと どうなる？', a:'おしちぢめられる', w:['ふえる','きえる','つめたくなる']},
    {q:'夏の 大三角に ふくまれる 星は？', a:'ベガ（おりひめ星）', w:['北きょく星','金星','太陽']},
    {q:'夜空で ほとんど うごかない 目じるしの 星は？', a:'北きょく星', w:['シリウス','月','火星']},
    {q:'月の 形は どう かわる？', a:'日に よって かわる', w:['ずっと まんまる','ぜったい かわらない','三角になる']},
    {q:'ヘチマや ツルレイシは どの きせつに よく そだつ？', a:'夏', w:['冬','春のはじめ','雪のとき']},
    {q:'冬に なると 木の ようすは どうなる？', a:'はが おちる ものが ある', w:['花がさく','実がふえる','大きくなる']},
    {q:'うでを まげるとき うごく かたい ものは？', a:'ほね と きん肉', w:['ひふだけ','血だけ','空気']},
    {q:'ほねと ほねの つなぎめで まがる ところを 何という？', a:'関節（かんせつ）', w:['ひふ','けっかん','しんぞう']},
    {q:'すずしくなると ツバメは どうする？', a:'あたたかい 南へ いく', w:['冬みんする','色がかわる','地中にもぐる']},
    {q:'温度を はかる どうぐは？', a:'温度計', w:['ものさし','はかり','時計']},
    {q:'water（水）が じめんに しみこんで たまる ところは？', a:'地下水', w:['雲','うみのうえ','空']},
  ];

  // ---- 計算問題生成 ----
  function makeCalc(){
    let kind = S.level===3 ? rnd(1,3) : S.level;
    let a,b,op,ans;
    if(kind===1){
      if(Math.random()<0.5){ a=rnd(2,50); b=rnd(2,50); op='+'; ans=a+b; }
      else { a=rnd(10,60); b=rnd(1,a); op='−'; ans=a-b; }
    } else { a=rnd(2,9); b=rnd(2,9); op='×'; ans=a*b; }
    const set=new Set([ans]); let g=0;
    while(set.size<4 && g<60){ g++; let v=ans+rnd(1,9)*(Math.random()<0.5?-1:1); if(v>=0) set.add(v); }
    while(set.size<4) set.add(ans+set.size);
    return { text:`${a} ${op} ${b} = ?`, ans:String(ans),
             choices:shuffle([...set].map(String)), calc:true };
  }
  // ---- クイズ問題を1問形式に ----
  function buildQuiz(item){
    return { text:item.q, ans:item.a, choices:shuffle([item.a,...item.w]), calc:false };
  }

  function buildQueue(){
    if(S.subject==='calc'){
      S.queue=Array.from({length:S.total},()=>makeCalc());
    } else {
      const pool = S.subject==='shakai'?SHAKAI:RIKA;
      S.queue = shuffle(pool).slice(0,S.total).map(buildQuiz);
    }
  }

  const PRAISE=['せいかい！','すごい！','てんさい！','ばっちり！','やったね！','その調子！'];
  const CHEER =['おしい！','だいじょうぶ','つぎ いこう','がんばれ！','ドンマイ！'];

  function showQuestion(){
    S.locked=false;
    const p=S.queue[S.idx];
    el('question').textContent=p.text;
    el('question').className = 'q'+(p.calc?' calc':'');
    el('speech').textContent=`${S.idx+1}もんめ！`;
    el('hint').textContent='';
    el('mochi').className='mochi';
    el('progress').textContent=`${S.idx+1} / ${S.total}もん`;
    el('bar').style.width=(S.idx/S.total*100)+'%';

    const wrap=el('choices'); wrap.innerHTML='';
    wrap.className='choices'+(p.calc?'':' col1'); // 文章は1列で読みやすく
    p.choices.forEach(c=>{
      const b=document.createElement('button');
      b.className='choice'+(p.calc?' num':'');
      b.textContent=c;
      b.onclick=()=>answer(b,c,p.ans);
      wrap.appendChild(b);
    });
  }

  function answer(btn,val,correctVal){
    if(S.locked) return; S.locked=true;
    const correct=(val===correctVal);
    [...document.querySelectorAll('.choice')].forEach(b=>{
      b.disabled=true;
      if(b.textContent===correctVal) b.classList.add('correct');
    });
    if(correct){
      btn.classList.add('correct'); S.score++; S.streak++;
      el('mochi').className='mochi happy';
      el('speech').textContent=PRAISE[rnd(0,PRAISE.length-1)]+(S.streak>=3?' 🔥':'');
    } else {
      btn.classList.add('wrong'); S.streak=0; S.hearts--;
      el('mochi').className='mochi sad';
      el('speech').textContent=CHEER[rnd(0,CHEER.length-1)];
      el('hint').textContent=`こたえ：${correctVal}`;
    }
    el('score').textContent=S.score;
    el('streak').textContent=S.streak;
    el('hearts').textContent='❤'.repeat(Math.max(0,S.hearts))||'🩶';

    setTimeout(()=>{
      S.idx++;
      if(S.idx>=S.total || S.hearts<=0) endGame();
      else showQuestion();
    }, correct?800:1600);
  }

  function endGame(){
    el('gameView').classList.add('hidden');
    el('endView').classList.remove('hidden');
    const rate=S.score/S.total;
    el('stars').textContent = rate>=0.9?'⭐⭐⭐':rate>=0.6?'⭐⭐☆':'⭐☆☆';
    el('endMochi').textContent = S.hearts<=0?'😺':(rate>=0.9?'🏆':'🐹');
    el('endMsg').textContent = S.hearts<=0?'またチャレンジしてね！'
      : rate>=0.9?'パーフェクトに ちかい！すごい！'
      : rate>=0.6?'よくがんばったね！':'れんしゅう すれば もっといけるよ！';
    el('endScore').textContent=`メダル ${S.score}こ`;
    el('bar').style.width='100%';
  }

  function startGame(){
    S.idx=0; S.score=0; S.streak=0; S.hearts=3; S.locked=false;
    buildQueue();
    el('score').textContent=0; el('streak').textContent=0; el('hearts').textContent='❤❤❤';
    el('menuView').classList.add('hidden');
    el('endView').classList.add('hidden');
    el('gameView').classList.remove('hidden');
    showQuestion();
  }

  // ---- メニュー制御 ----
  document.querySelectorAll('.subj').forEach(b=>{
    b.onclick=()=>{
      S.subject=b.dataset.subj;
      if(S.subject==='calc'){
        el('calcLevel').classList.remove('hidden');
        document.querySelector('.subjects').classList.add('hidden');
      } else {
        startGame();
      }
    };
  });
  el('lvPicker').addEventListener('click',e=>{
    const b=e.target.closest('.lv'); if(!b) return;
    document.querySelectorAll('.lv').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); S.level=Number(b.dataset.lv);
  });
  el('calcStartBtn').onclick=startGame;
  el('calcBack').onclick=()=>{
    el('calcLevel').classList.add('hidden');
    document.querySelector('.subjects').classList.remove('hidden');
  };
  el('againBtn').onclick=()=>{
    el('endView').classList.add('hidden');
    el('calcLevel').classList.add('hidden');
    document.querySelector('.subjects').classList.remove('hidden');
    el('menuView').classList.remove('hidden');
  };
})();
</script>
</body>
</html>
